<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juntar PDFs</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>

  <main class="container">
    <div class="card">
      <h1>Juntar PDFs</h1>

      <p class="description">
        Selecione os arquivos PDF que deseja unir em um único documento.
      </p>

        <label for="pdfInput" class="custom-upload">
            📄 Escolher PDFs
        </label>

        <input
            type="file"
            id="pdfInput"
            accept="application/pdf"
            multiple
        />

      <ul id="fileList"></ul>

      <button id="mergeBtn" type="button">
        Juntar PDFs
      </button>

      <p id="status"></p>
    </div>
  </main>

</body>
</html>
